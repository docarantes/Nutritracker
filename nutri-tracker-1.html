<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="NutriTracker">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#0f1117">
<title>NutriTracker</title>
<script>
const manifest = {
  name: "NutriTracker", short_name: "NutriTracker",
  start_url: "./nutri-tracker.html", display: "standalone",
  background_color: "#0f1117", theme_color: "#0f1117", orientation: "portrait",
  icons: [{ src: "https://fav.farm/🥗", sizes: "192x192", type: "image/png" }]
};
const blob = new Blob([JSON.stringify(manifest)], {type:'application/json'});
const link = document.createElement('link');
link.rel = 'manifest'; link.href = URL.createObjectURL(blob);
document.currentScript.after(link);
</script>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#0f1117; --card:#1a1d27; --border:#2a2d3a;
  --accent:#7fffb2; --accent-dim:#3d7a56;
  --warn:#ffb347; --danger:#ff6b6b;
  --text:#e8eaf0; --muted:#6b7080;
  --purple:#b388ff; --blue:#4fc3f7; --orange:#ff9966;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
body{background:var(--bg);color:var(--text);font-family:'DM Sans',system-ui,sans-serif;min-height:100vh;max-width:500px;margin:0 auto;padding-bottom:100px;}
input,textarea,button,select{font-family:inherit;}
input[type="date"],input[type="number"]{color-scheme:dark;}
.header{padding:52px 16px 0;background:linear-gradient(180deg,#0d1520 0%,#0f1117 100%);position:sticky;top:0;z-index:10;}
.header-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;}
.header-title{font-size:11px;letter-spacing:0.12em;text-transform:uppercase;color:var(--accent);margin-bottom:2px;}
.header-name{font-size:20px;font-weight:700;}
.card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:16px;margin-bottom:10px;}
.macro-row{display:flex;justify-content:space-between;margin-bottom:4px;}
.macro-label{color:var(--muted);font-size:11px;letter-spacing:0.08em;text-transform:uppercase;}
.macro-value{font-size:12px;font-family:'DM Mono',monospace;}
.macro-track{height:4px;background:#2a2d3a;border-radius:2px;overflow:hidden;margin-bottom:12px;}
.macro-fill{height:100%;border-radius:2px;transition:width 0.6s ease;}
.pills{display:flex;gap:6px;margin-bottom:14px;overflow-x:auto;padding-bottom:2px;}
.pill{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:6px 12px;white-space:nowrap;flex-shrink:0;}
.pill-label{color:var(--muted);font-size:10px;}
.pill-val{font-size:13px;font-weight:600;font-family:'DM Mono',monospace;}
.entry-card{background:var(--card);border:1px solid var(--border);border-radius:10px;margin-bottom:8px;overflow:hidden;}
.entry-card.activity{border-left:3px solid var(--orange);}
.entry-header{display:flex;align-items:center;gap:10px;padding:10px 14px;cursor:pointer;}
.entry-emoji{font-size:20px;}
.entry-info{flex:1;}
.entry-name{font-size:13px;font-weight:500;}
.entry-meta{color:var(--muted);font-size:11px;}
.entry-badge{border-radius:4px;padding:2px 7px;font-size:11px;}
.badge-food{background:#7fffb222;color:var(--accent);}
.badge-activity{background:#ff996622;color:var(--orange);}
.entry-body{border-top:1px solid var(--border);padding:10px 14px;background:#13151e;}
.entry-desc{color:var(--muted);font-size:12px;margin-bottom:8px;line-height:1.6;}
.entry-macros{display:flex;gap:12px;flex-wrap:wrap;margin-bottom:8px;}
.entry-macro{color:var(--muted);font-size:11px;}
.entry-macro b{color:var(--text);}
.entry-note{color:var(--accent-dim);font-size:11px;font-style:italic;margin-bottom:8px;}
.activity-stats{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:8px;}
.act-stat{background:#1a1d27;border-radius:8px;padding:8px 10px;text-align:center;}
.act-stat-val{font-size:18px;font-weight:700;font-family:'DM Mono',monospace;color:var(--orange);}
.act-stat-unit{font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:0.06em;}
.act-stat-label{font-size:10px;color:var(--muted);margin-top:2px;}
.btn{border:none;border-radius:8px;padding:12px;font-size:14px;font-weight:700;cursor:pointer;transition:opacity 0.15s;}
.btn:active{opacity:0.8;}
.btn-primary{background:var(--accent);color:#0f1117;width:100%;}
.btn-activity{background:var(--orange);color:#0f1117;width:100%;}
.btn-secondary{background:#2a2d3a;color:var(--muted);}
.btn-danger{background:#ff6b6b22;color:var(--danger);border:1px solid #ff6b6b44;font-size:11px;padding:4px 10px;font-weight:400;}
.btn-outline{background:#b388ff22;border:1px solid #b388ff44;color:var(--purple);border-radius:8px;padding:6px 12px;font-size:12px;font-weight:500;cursor:pointer;}
.btn:disabled{opacity:0.4;cursor:not-allowed;}
.input{width:100%;background:#13151e;border:1px solid var(--border);color:var(--text);border-radius:8px;padding:10px 12px;font-size:13px;outline:none;transition:border-color 0.2s;}
.input:focus{border-color:var(--accent-dim);}
textarea.input{resize:vertical;min-height:80px;}
.input-label{color:var(--muted);font-size:11px;text-transform:uppercase;letter-spacing:0.08em;display:block;margin-bottom:5px;}
.input-row{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px;}
.input-group{margin-bottom:12px;}
.modal-overlay{position:fixed;inset:0;background:#000000cc;z-index:100;display:flex;align-items:flex-end;justify-content:center;}
.modal-sheet{background:var(--card);border-radius:16px 16px 0 0;width:100%;max-width:500px;padding:20px;border:1px solid var(--border);max-height:88vh;overflow-y:auto;}
.modal-center{position:fixed;inset:0;background:#000000cc;z-index:100;display:flex;align-items:center;justify-content:center;padding:16px;}
.modal-box{background:var(--card);border-radius:16px;width:100%;max-width:500px;padding:20px;border:1px solid var(--border);max-height:82vh;overflow-y:auto;}
.modal-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;}
.modal-title{font-size:16px;font-weight:700;}
.modal-close{background:none;border:none;color:var(--muted);font-size:22px;cursor:pointer;line-height:1;}
.type-selector{display:flex;gap:8px;margin-bottom:16px;}
.type-btn{flex:1;padding:10px;border-radius:10px;border:1px solid var(--border);background:transparent;color:var(--muted);font-size:13px;cursor:pointer;text-align:center;transition:all 0.15s;}
.type-btn.active-food{background:#7fffb222;border-color:var(--accent-dim);color:var(--accent);font-weight:600;}
.type-btn.active-activity{background:#ff996622;border-color:#cc7744;color:var(--orange);font-weight:600;}
.result-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:10px;}
.result-cell{background:#1a1d27;border-radius:6px;padding:8px 10px;}
.result-cell-label{color:var(--muted);font-size:10px;}
.result-cell-val{font-size:20px;font-weight:700;}
.result-cell-unit{font-size:11px;color:var(--muted);}
.fab{position:fixed;bottom:24px;right:24px;width:56px;height:56px;background:var(--accent);border:none;border-radius:50%;font-size:26px;cursor:pointer;box-shadow:0 4px 20px #7fffb266;display:flex;align-items:center;justify-content:center;z-index:50;color:#0f1117;font-weight:300;line-height:1;transition:transform 0.15s;}
.fab:active{transform:scale(0.93);}
.settings-row{display:flex;align-items:center;gap:10px;margin-bottom:14px;}
.key-display{flex:1;background:#13151e;border:1px solid var(--border);border-radius:8px;padding:10px 12px;font-size:12px;color:var(--muted);font-family:'DM Mono',monospace;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
@keyframes spin{to{transform:rotate(360deg);}}
.spinner{display:inline-block;animation:spin 1s linear infinite;font-size:28px;}
.photo-btn{background:#13151e;border:1px dashed var(--border);color:var(--muted);border-radius:8px;padding:10px;font-size:13px;cursor:pointer;flex:1;}
.photo-preview{width:100%;border-radius:8px;margin-top:8px;max-height:160px;object-fit:cover;display:block;}
.empty{text-align:center;padding:48px 0;color:var(--muted);}
.empty-icon{font-size:40px;margin-bottom:8px;}
.date-input{width:100%;background:var(--card);border:1px solid var(--border);color:var(--text);border-radius:8px;padding:8px 12px;font-size:13px;margin-bottom:14px;outline:none;}
.kcal-big{font-size:32px;font-weight:700;font-family:'DM Mono',monospace;}
.kcal-meta{color:var(--muted);font-size:10px;text-transform:uppercase;letter-spacing:0.08em;}
.report-text{color:var(--text);font-size:13px;line-height:1.75;white-space:pre-wrap;}
.tabs{display:flex;gap:4px;padding:0 16px 14px;}
.tab{flex:1;padding:7px;border-radius:8px;border:1px solid var(--border);background:transparent;color:var(--muted);font-size:12px;cursor:pointer;text-align:center;transition:all 0.15s;}
.tab.active{background:#7fffb222;border-color:var(--accent-dim);color:var(--accent);font-weight:600;}
.setup-screen{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:32px 24px;text-align:center;}
.setup-logo{font-size:56px;margin-bottom:20px;}
.setup-title{font-size:22px;font-weight:700;margin-bottom:8px;}
.setup-sub{color:var(--muted);font-size:14px;line-height:1.6;margin-bottom:28px;}
.setup-link{color:var(--accent);text-decoration:none;}
.history-day{margin-bottom:18px;}
.history-date{color:var(--muted);font-size:11px;text-transform:uppercase;letter-spacing:0.1em;padding:0 0 6px;border-bottom:1px solid var(--border);margin-bottom:8px;}
.section{padding:0 16px;}
.conf-badge{font-size:10px;border-radius:4px;padding:2px 6px;}
.conf-high{background:#7fffb222;color:var(--accent);}
.conf-medium{background:#ffb34722;color:var(--warn);}
.conf-low{background:#ff6b6b22;color:var(--danger);}
.chevron{color:var(--muted);font-size:12px;transition:transform 0.2s;}
.chevron.open{transform:rotate(180deg);}
.zone-badge{display:inline-block;border-radius:4px;padding:2px 8px;font-size:11px;font-weight:600;}
.zone-1{background:#4fc3f722;color:var(--blue);}
.zone-2{background:#7fffb222;color:var(--accent);}
.zone-3{background:#ffb34722;color:var(--warn);}
.zone-4{background:#ff966622;color:var(--orange);}
.zone-5{background:#ff6b6b22;color:var(--danger);}
::-webkit-scrollbar{width:4px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px;}
</style>
</head>
<body>
<div id="app"></div>
<script>
const TARGET = { kcalMin:1500, kcalMax:1700, protein:100, fiber:25 };
const ENTRIES_KEY = 'nutri_entries_v3';
const KEY_KEY = 'nutri_api_key';

let state = {
  view:'today', entries:[], apiKey:'',
  filterDate:todayStr(), modal:null,
  addType:'food', addStep:'input',
  addText:'', addImageB64:null, addImageURL:null,
  addResult:null, addError:null, addDate:todayStr(),
  expandedEntries:new Set(),
  reportText:'', reportLoading:false,
  actName:'', actDuration:'', actKcal:'', actHrAvg:'', actHrMax:'', actNotes:'',
};

function todayStr(){ return new Date().toISOString().slice(0,10); }
function nowTime(){ return new Date().toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'}); }

function loadState(){
  try {
    const old = localStorage.getItem('nutri_meals_v2');
    if(old){
      const meals = JSON.parse(old);
      meals.forEach(m=>{ if(!m.kind) m.kind='food'; });
      state.entries = meals;
      localStorage.setItem(ENTRIES_KEY, JSON.stringify(state.entries));
      localStorage.removeItem('nutri_meals_v2');
      state.apiKey = localStorage.getItem(KEY_KEY)||'';
      return;
    }
  } catch{}
  try{ state.entries = JSON.parse(localStorage.getItem(ENTRIES_KEY)||'[]'); }catch{}
  state.apiKey = localStorage.getItem(KEY_KEY)||'';
}
function saveEntries(){ localStorage.setItem(ENTRIES_KEY, JSON.stringify(state.entries)); }
function saveKey(k){ localStorage.setItem(KEY_KEY,k); }

function dayFood(date){ return state.entries.filter(e=>e.date===date&&e.kind!=='activity'); }
function dayActivities(date){ return state.entries.filter(e=>e.date===date&&e.kind==='activity'); }
function dayTotals(date){
  return dayFood(date).reduce((a,m)=>({
    kcal:a.kcal+(m.kcal||0), protein:a.protein+(m.protein||0),
    fiber:a.fiber+(m.fiber||0), fat:a.fat+(m.fat||0), carbs:a.carbs+(m.carbs||0),
  }),{kcal:0,protein:0,fiber:0,fat:0,carbs:0});
}
function dayActivityKcal(date){ return state.entries.filter(e=>e.date===date&&e.kind==='activity').reduce((a,e)=>a+(e.kcal||0),0); }

async function callClaude(messages, maxTokens=1000){
  const resp = await fetch('https://api.anthropic.com/v1/messages',{
    method:'POST',
    headers:{'Content-Type':'application/json','x-api-key':state.apiKey,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},
    body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:maxTokens,messages}),
  });
  const data = await resp.json();
  if(data.error) throw new Error(data.error.message);
  return data.content?.find(b=>b.type==='text')?.text||'';
}

async function analyzeFood(){
  state.addStep='analyzing'; state.addError=null; render();
  try{
    const uc=[];
    if(state.addImageB64) uc.push({type:'image',source:{type:'base64',media_type:'image/jpeg',data:state.addImageB64}});
    uc.push({type:'text',text:state.addText||'Analise a imagem da refeição.'});
    uc.push({type:'text',text:`Analise essa refeição e retorne APENAS um JSON válido (sem markdown, sem backticks):
{"label":"nome curto","emoji":"emoji","kcal":0,"protein":0,"fat":0,"carbs":0,"fiber":0,"description":"alimentos e porções estimadas","notes":"dica ou string vazia","confidence":"low|medium|high"}
Contexto: adulto, restrição calórica 1500-1700 kcal/dia, meta 100g+ proteína, 25-35g fibra.`});
    const raw = await callClaude([{role:'user',content:uc}]);
    const parsed = JSON.parse(raw.replace(/```json|```/g,'').trim());
    parsed.id=Date.now().toString(); parsed.kind='food'; parsed.time=nowTime(); parsed.date=state.addDate;
    state.addResult=parsed; state.addStep='done';
  }catch(e){ state.addError='Erro: '+e.message; state.addStep='input'; }
  render();
}

async function analyzeActivity(){
  state.addStep='analyzing'; state.addError=null; render();
  try{
    const uc=[];
    if(state.addImageB64) uc.push({type:'image',source:{type:'base64',media_type:'image/jpeg',data:state.addImageB64}});
    if(state.addText) uc.push({type:'text',text:state.addText});
    uc.push({type:'text',text:`Analise esta atividade física e retorne APENAS um JSON válido (sem markdown, sem backticks):
{"label":"nome da atividade","emoji":"emoji esportivo","duration":0,"kcal":0,"hrAvg":0,"hrMax":0,"zone":"Zona 1|Zona 2|Zona 3|Zona 4|Zona 5","description":"resumo da sessão","notes":"observação ou string vazia","confidence":"low|medium|high"}
duration=minutos, kcal=queimadas, hrAvg/hrMax em bpm (0 se não informado).
Zonas FC: Z1<55%, Z2 55-65%, Z3 65-75%, Z4 75-85%, Z5>85% FCmáx estimada adulto ~45 anos (FCmax~175).`});
    const raw = await callClaude([{role:'user',content:uc}]);
    const parsed = JSON.parse(raw.replace(/```json|```/g,'').trim());
    parsed.id=Date.now().toString(); parsed.kind='activity'; parsed.time=nowTime(); parsed.date=state.addDate;
    state.addResult=parsed; state.addStep='done';
  }catch(e){ state.addError='Erro: '+e.message; state.addStep='input'; }
  render();
}

function guessZone(hrAvg){
  if(!hrAvg) return '';
  const pct=hrAvg/175*100;
  if(pct<55) return 'Zona 1'; if(pct<65) return 'Zona 2';
  if(pct<75) return 'Zona 3'; if(pct<85) return 'Zona 4'; return 'Zona 5';
}

function saveManualActivity(){
  const entry={
    id:Date.now().toString(), kind:'activity', date:state.addDate, time:nowTime(),
    label:state.actName||'Atividade física', emoji:'🏃',
    duration:parseInt(state.actDuration)||0, kcal:parseInt(state.actKcal)||0,
    hrAvg:parseInt(state.actHrAvg)||0, hrMax:parseInt(state.actHrMax)||0,
    zone:guessZone(parseInt(state.actHrAvg)||0),
    description:state.actName, notes:state.actNotes, confidence:'high',
  };
  state.entries.push(entry); saveEntries(); state.modal=null; render();
}

async function generateReport(){
  state.reportLoading=true; state.reportText=''; render();
  const food=state.entries.filter(e=>e.kind!=='activity')
    .map(e=>`${e.date} ${e.time} [REFEIÇÃO] ${e.label}: ${e.kcal}kcal, ${e.protein}g prot, ${e.fiber}g fibra`).join('\n');
  const acts=state.entries.filter(e=>e.kind==='activity')
    .map(e=>`${e.date} ${e.time} [ATIVIDADE] ${e.label}: ${e.duration}min, ${e.kcal}kcal, FC avg ${e.hrAvg}bpm, FC max ${e.hrMax}bpm, ${e.zone}`).join('\n');
  try{
    state.reportText = await callClaude([{role:'user',content:
`Analise este histórico e gere relatório conciso em português com:
1. Padrões nutricionais (pontos fortes e fracos recorrentes)
2. Padrões de atividade física (frequência, intensidade, progressão)
3. Balanço calórico (ingestão vs gasto)
4. Comparação com metas: ${TARGET.kcalMin}-${TARGET.kcalMax} kcal, ${TARGET.protein}g+ proteína, ${TARGET.fiber}-35g fibra
5. 3 recomendações práticas prioritárias
6. Nota geral A/B/C/D

REFEIÇÕES:\n${food||'Nenhuma'}\n\nATIVIDADES:\n${acts||'Nenhuma'}`
    }],1400);
  }catch(e){ state.reportText='Erro: '+e.message; }
  state.reportLoading=false; render();
}

function macroBar(label,value,target,unit,color){
  const pct=Math.min((value/target)*100,100), over=value>target;
  const c=over?'var(--warn)':color;
  return `<div class="macro-row"><span class="macro-label">${label}</span><span class="macro-value" style="color:${over?'var(--warn)':'var(--text)'}">${Math.round(value)}<span style="color:var(--muted)">/${target}${unit}</span></span></div>
  <div class="macro-track"><div class="macro-fill" style="width:${pct}%;background:${c};box-shadow:0 0 8px ${c}55"></div></div>`;
}

function zoneClass(z){ return {'Zona 1':'zone-1','Zona 2':'zone-2','Zona 3':'zone-3','Zona 4':'zone-4','Zona 5':'zone-5'}[z]||'zone-3'; }

function entryCard(e){
  const exp=state.expandedEntries.has(e.id), isAct=e.kind==='activity';
  return `<div class="entry-card${isAct?' activity':''}">
    <div class="entry-header" onclick="toggleEntry('${e.id}')">
      <span class="entry-emoji">${e.emoji||'🍽️'}</span>
      <div class="entry-info">
        <div class="entry-name">${e.label}</div>
        <div class="entry-meta">${e.time}${isAct&&e.duration?' · '+e.duration+'min':' · '+e.kcal+' kcal'}</div>
      </div>
      <div style="display:flex;gap:6px;align-items:center">
        ${isAct?`<span class="entry-badge badge-activity">${e.kcal} kcal</span>`:`<span class="entry-badge badge-food">${e.protein}g P</span>`}
        <span class="chevron${exp?' open':''}">▼</span>
      </div>
    </div>
    ${exp?`<div class="entry-body">
      ${isAct?`<div class="activity-stats">
        <div class="act-stat"><div class="act-stat-val">${e.duration||'—'}</div><div class="act-stat-unit">min</div><div class="act-stat-label">Duração</div></div>
        <div class="act-stat"><div class="act-stat-val">${e.hrAvg||'—'}</div><div class="act-stat-unit">bpm</div><div class="act-stat-label">FC Média</div></div>
        <div class="act-stat"><div class="act-stat-val">${e.hrMax||'—'}</div><div class="act-stat-unit">bpm</div><div class="act-stat-label">FC Máx</div></div>
      </div>
      <div style="margin-bottom:8px;display:flex;gap:8px;align-items:center;flex-wrap:wrap">
        <span style="color:var(--muted);font-size:11px">🔥 <b style="color:var(--text)">${e.kcal}</b> kcal queimadas</span>
        ${e.zone?`<span class="zone-badge ${zoneClass(e.zone)}">${e.zone}</span>`:''}
      </div>`
      :`<p class="entry-desc">${e.description||''}</p>
      <div class="entry-macros">
        <span class="entry-macro">🔥 <b>${e.kcal}</b> kcal</span>
        <span class="entry-macro">💪 <b>${e.protein}</b>g prot</span>
        <span class="entry-macro">🌿 <b>${e.fiber}</b>g fibra</span>
        <span class="entry-macro">🫙 <b>${e.fat}</b>g gord</span>
        <span class="entry-macro">🍞 <b>${e.carbs}</b>g carb</span>
        <span class="conf-badge conf-${e.confidence||'medium'}">${e.confidence||'medium'}</span>
      </div>`}
      ${e.description&&isAct?`<p class="entry-desc">${e.description}</p>`:''}
      ${e.notes?`<p class="entry-note">💡 ${e.notes}</p>`:''}
      <button class="btn btn-danger" onclick="deleteEntry('${e.id}')">Excluir</button>
    </div>`:''}
  </div>`;
}

function kcalColor(k){ return k>TARGET.kcalMax?'var(--danger)':k>=TARGET.kcalMin?'var(--accent)':'var(--warn)'; }
function kcalStatus(k){
  if(k>TARGET.kcalMax) return Math.round(k-TARGET.kcalMax)+' kcal acima';
  if(k>=TARGET.kcalMin) return '✓ Dentro da meta';
  return Math.round(TARGET.kcalMin-k)+' kcal abaixo';
}

function renderSetup(){
  return `<div class="setup-screen">
    <div class="setup-logo">🥗</div>
    <div class="setup-title">NutriTracker</div>
    <p class="setup-sub">Insira sua chave da API Anthropic para começar.<br>Ela fica salva <b>só neste dispositivo</b>.<br><br>
    <a class="setup-link" href="https://console.anthropic.com" target="_blank">Criar chave → console.anthropic.com</a></p>
    <div style="width:100%;margin-bottom:12px">
      <label class="input-label">Anthropic API Key</label>
      <input id="setup-key" class="input" type="password" placeholder="sk-ant-...">
    </div>
    <button class="btn btn-primary" onclick="saveApiKey()">Salvar e entrar →</button>
  </div>`;
}

function renderToday(){
  const all=state.entries.filter(e=>e.date===state.filterDate).sort((a,b)=>a.time.localeCompare(b.time));
  const t=dayTotals(state.filterDate), actK=dayActivityKcal(state.filterDate);
  const kColor=kcalColor(t.kcal), acts=dayActivities(state.filterDate);
  return `<div style="padding:0 16px 10px">
    <input type="date" class="date-input" value="${state.filterDate}" onchange="setDate(this.value)">
    <div class="card">
      <div style="display:flex;align-items:center;gap:16px;margin-bottom:14px">
        <div style="text-align:center;min-width:64px">
          <div class="kcal-big" style="color:${kColor}">${Math.round(t.kcal)}</div>
          <div class="kcal-meta">kcal ingeridas</div>
        </div>
        <div style="flex:1">
          <div class="macro-row"><span class="macro-label">Meta</span><span style="font-size:11px;font-family:'DM Mono',monospace;color:${kColor}">${TARGET.kcalMin}–${TARGET.kcalMax}</span></div>
          <div class="macro-track" style="height:6px;margin-bottom:6px"><div class="macro-fill" style="width:${Math.min((t.kcal/TARGET.kcalMax)*100,100)}%;background:${kColor};box-shadow:0 0 10px ${kColor}66;height:6px"></div></div>
          <div style="font-size:11px;color:${kColor}">${kcalStatus(t.kcal)}</div>
        </div>
      </div>
      ${macroBar('Proteína',t.protein,TARGET.protein,'g','var(--accent)')}
      ${macroBar('Fibra',t.fiber,TARGET.fiber,'g','var(--purple)')}
    </div>
    ${actK>0?`<div class="card" style="border-left:3px solid var(--orange);padding:12px 16px">
      <div style="display:flex;justify-content:space-between;align-items:center">
        <div>
          <div style="font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:0.08em;margin-bottom:2px">🏃 Atividade do dia</div>
          <div style="font-size:11px;color:var(--muted)">${acts.map(a=>a.label).join(' · ')}</div>
        </div>
        <div style="text-align:right">
          <div style="font-size:22px;font-weight:700;font-family:'DM Mono',monospace;color:var(--orange)">${Math.round(actK)}</div>
          <div style="font-size:10px;color:var(--muted)">kcal queimadas</div>
        </div>
      </div>
    </div>`:''}
    <div class="pills">
      <div class="pill"><span class="pill-label">Carbs </span><span class="pill-val" style="color:var(--blue)">${Math.round(t.carbs)}g</span></div>
      <div class="pill"><span class="pill-label">Gordura </span><span class="pill-val" style="color:var(--warn)">${Math.round(t.fat)}g</span></div>
      <div class="pill"><span class="pill-label">Refeições </span><span class="pill-val" style="color:var(--muted)">${dayFood(state.filterDate).length}</span></div>
      <div class="pill"><span class="pill-label">Atividades </span><span class="pill-val" style="color:var(--orange)">${acts.length}</span></div>
    </div>
  </div>
  <div style="padding:0 16px">
    ${all.length===0?`<div class="empty"><div class="empty-icon">🍽️</div><p>Nenhum registro neste dia.</p></div>`:all.map(entryCard).join('')}
  </div>`;
}

function renderHistory(){
  const byDate={};
  state.entries.forEach(e=>{ if(!byDate[e.date]) byDate[e.date]=[]; byDate[e.date].push(e); });
  const dates=Object.keys(byDate).sort((a,b)=>b.localeCompare(a));
  if(!dates.length) return `<div class="section"><div class="empty"><div class="empty-icon">📅</div><p>Sem histórico ainda.</p></div></div>`;
  return `<div class="section">${dates.map(date=>{
    const entries=byDate[date].sort((a,b)=>a.time.localeCompare(b.time));
    const t=dayTotals(date), actK=dayActivityKcal(date), kc=kcalColor(t.kcal);
    const d=new Date(date+'T12:00:00');
    const label=d.toLocaleDateString('pt-BR',{weekday:'short',day:'numeric',month:'short'});
    return `<div class="history-day">
      <div class="history-date" style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:4px">
        <span>${label}</span>
        <span style="display:flex;gap:8px">
          <span style="color:${kc};font-family:'DM Mono',monospace;font-size:11px">${Math.round(t.kcal)} kcal · ${Math.round(t.protein)}g P</span>
          ${actK>0?`<span style="color:var(--orange);font-family:'DM Mono',monospace;font-size:11px">🏃${Math.round(actK)}</span>`:''}
        </span>
      </div>
      ${entries.map(entryCard).join('')}
    </div>`;
  }).join('')}</div>`;
}

function renderSettings(){
  const masked=state.apiKey?state.apiKey.slice(0,8)+'•••••••••••••••'+state.apiKey.slice(-4):'—';
  return `<div class="section">
    <div class="card" style="margin-top:8px">
      <div style="font-size:13px;font-weight:600;margin-bottom:14px">🔑 API Key</div>
      <div class="settings-row"><div class="key-display">${masked}</div><button class="btn-outline" onclick="promptChangeKey()">Alterar</button></div>
      <p style="color:var(--muted);font-size:11px;line-height:1.6">Armazenada apenas localmente. Nunca sai do dispositivo além das chamadas à API Anthropic.</p>
    </div>
    <div class="card">
      <div style="font-size:13px;font-weight:600;margin-bottom:14px">🎯 Metas</div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px">
        ${[['🔥 Calorias',`${TARGET.kcalMin}–${TARGET.kcalMax} kcal`],['💪 Proteína',`${TARGET.protein}g+`],['🌿 Fibra',`${TARGET.fiber}–35g`],['⚖️ Método','US Navy Tape']].map(([l,v])=>`
        <div style="background:#13151e;border-radius:8px;padding:10px"><div style="color:var(--muted);font-size:10px">${l}</div><div style="font-size:13px;font-weight:600;margin-top:2px">${v}</div></div>`).join('')}
      </div>
    </div>
    <div class="card">
      <div style="font-size:13px;font-weight:600;margin-bottom:14px">📊 Dados</div>
      <p style="color:var(--muted);font-size:12px;margin-bottom:12px">${state.entries.filter(e=>e.kind!=='activity').length} refeições · ${state.entries.filter(e=>e.kind==='activity').length} atividades</p>
      <button class="btn" style="background:#ff6b6b22;color:var(--danger);border:1px solid #ff6b6b44;width:100%;font-size:13px" onclick="confirmClear()">🗑️ Apagar todos os dados</button>
    </div>
  </div>`;
}

function renderAddModal(){
  const s=state.addStep, isAct=state.addType==='activity';
  return `<div class="modal-overlay" onclick="closeModalOverlay(event)">
    <div class="modal-sheet">
      <div class="modal-header">
        <span class="modal-title">+ Novo Registro</span>
        <button class="modal-close" onclick="closeModal()">✕</button>
      </div>
      <div class="type-selector">
        <button class="type-btn${!isAct?' active-food':''}" onclick="setAddType('food')">🥗 Refeição</button>
        <button class="type-btn${isAct?' active-activity':''}" onclick="setAddType('activity')">🏃 Atividade</button>
      </div>
      ${s==='input'?(isAct?renderActivityInput():renderFoodInput()):''}
      ${s==='analyzing'?`<div style="text-align:center;padding:48px 0"><div class="spinner">${isAct?'🏃':'⚙️'}</div><p style="color:var(--muted);margin-top:16px">Analisando...</p></div>`:''}
      ${s==='done'&&state.addResult?renderResult():''}
    </div>
  </div>`;
}

function renderFoodInput(){
  return `<div class="input-group"><label class="input-label">Data</label><input type="date" class="input" value="${state.addDate}" onchange="state.addDate=this.value"></div>
    <div class="input-group"><label class="input-label">Descrição</label>
    <textarea class="input" id="add-text" placeholder="Ex: salada + frango grelhado 150g + limão" oninput="state.addText=this.value;syncBtn()">${state.addText}</textarea></div>
    <input type="file" id="photo-camera" accept="image/*" capture="environment" style="display:none" onchange="handlePhoto(event)">
    <input type="file" id="photo-gallery" accept="image/*" style="display:none" onchange="handlePhoto(event)">
    <div style="display:flex;gap:8px;margin-bottom:10px">
      <button class="photo-btn" onclick="document.getElementById('photo-camera').click()">📷 Câmera</button>
      <button class="photo-btn" onclick="document.getElementById('photo-gallery').click()">🖼️ Galeria</button>
    </div>
    ${state.addImageURL?`<img src="${state.addImageURL}" class="photo-preview" style="margin-bottom:10px">`:''}
    ${state.addError?`<p style="color:var(--danger);font-size:12px;margin-bottom:10px">${state.addError}</p>`:''}
    <button id="analyze-btn" class="btn btn-primary" onclick="startAnalyze()" ${!state.addText&&!state.addImageB64?'disabled':''}>Analisar com IA →</button>`;
}

function renderActivityInput(){
  return `<div class="input-group"><label class="input-label">Data</label><input type="date" class="input" value="${state.addDate}" onchange="state.addDate=this.value"></div>
    <p style="color:var(--muted);font-size:12px;margin-bottom:12px">Descreva por texto/foto para análise por IA, ou preencha manualmente abaixo.</p>
    <div class="input-group"><label class="input-label">Descrição (para IA)</label>
    <textarea class="input" id="add-text" placeholder="Ex: remo 1h, FC avg 122bpm, max 145bpm, zona 3/4" oninput="state.addText=this.value" style="min-height:64px">${state.addText}</textarea></div>
    <input type="file" id="photo-camera" accept="image/*" capture="environment" style="display:none" onchange="handlePhoto(event)">
    <input type="file" id="photo-gallery" accept="image/*" style="display:none" onchange="handlePhoto(event)">
    <div style="display:flex;gap:8px;margin-bottom:14px">
      <button class="photo-btn" onclick="document.getElementById('photo-camera').click()">📷 Câmera</button>
      <button class="photo-btn" onclick="document.getElementById('photo-gallery').click()">🖼️ Galeria</button>
    </div>
    ${state.addImageURL?`<img src="${state.addImageURL}" class="photo-preview" style="margin-bottom:12px">`:''}
    <div style="border-top:1px solid var(--border);margin-bottom:14px;padding-top:14px">
      <label class="input-label" style="margin-bottom:10px">Preenchimento manual</label>
      <div class="input-group"><label class="input-label">Nome da atividade</label><input class="input" placeholder="Ex: Remo, Corrida, Funcional..." value="${state.actName}" oninput="state.actName=this.value"></div>
      <div class="input-row">
        <div><label class="input-label">Duração (min)</label><input class="input" type="number" placeholder="60" value="${state.actDuration}" oninput="state.actDuration=this.value"></div>
        <div><label class="input-label">Kcal queimadas</label><input class="input" type="number" placeholder="450" value="${state.actKcal}" oninput="state.actKcal=this.value"></div>
      </div>
      <div class="input-row">
        <div><label class="input-label">FC Média (bpm)</label><input class="input" type="number" placeholder="122" value="${state.actHrAvg}" oninput="state.actHrAvg=this.value"></div>
        <div><label class="input-label">FC Máx (bpm)</label><input class="input" type="number" placeholder="145" value="${state.actHrMax}" oninput="state.actHrMax=this.value"></div>
      </div>
      <div class="input-group"><label class="input-label">Observações</label><input class="input" placeholder="Recorde, sensações, etc..." value="${state.actNotes}" oninput="state.actNotes=this.value"></div>
    </div>
    ${state.addError?`<p style="color:var(--danger);font-size:12px;margin-bottom:10px">${state.addError}</p>`:''}
    <div style="display:flex;gap:8px">
      <button class="btn btn-activity" style="flex:2" onclick="startAnalyze()">Analisar com IA →</button>
      <button class="btn btn-secondary" style="flex:1;font-size:12px" onclick="saveManualActivity()">Manual ✓</button>
    </div>`;
}

function renderResult(){
  const r=state.addResult, isAct=r.kind==='activity';
  return `<div style="background:#13151e;border-radius:10px;padding:14px;margin-bottom:14px">
    <div style="display:flex;align-items:center;gap:8px;margin-bottom:8px">
      <span style="font-size:24px">${r.emoji}</span>
      <span style="font-weight:600">${r.label}</span>
      <span class="conf-badge conf-${r.confidence}" style="margin-left:auto">${r.confidence}</span>
    </div>
    ${isAct?`<div class="activity-stats" style="margin-bottom:10px">
      <div class="act-stat"><div class="act-stat-val">${r.duration||'—'}</div><div class="act-stat-unit">min</div><div class="act-stat-label">Duração</div></div>
      <div class="act-stat"><div class="act-stat-val">${r.hrAvg||'—'}</div><div class="act-stat-unit">bpm</div><div class="act-stat-label">FC Média</div></div>
      <div class="act-stat"><div class="act-stat-val">${r.hrMax||'—'}</div><div class="act-stat-unit">bpm</div><div class="act-stat-label">FC Máx</div></div>
    </div>
    <div style="display:flex;gap:8px;align-items:center;margin-bottom:8px">
      <span style="color:var(--muted);font-size:12px">🔥 <b style="color:var(--text)">${r.kcal}</b> kcal</span>
      ${r.zone?`<span class="zone-badge ${zoneClass(r.zone)}">${r.zone}</span>`:''}
    </div>`
    :`<div class="result-grid">
      ${[['🔥 Calorias',r.kcal,'kcal'],['💪 Proteína',r.protein,'g'],['🌿 Fibra',r.fiber,'g'],['🍞 Carbs',r.carbs,'g']].map(([l,v,u])=>`
      <div class="result-cell"><div class="result-cell-label">${l}</div><div><span class="result-cell-val">${v}</span><span class="result-cell-unit"> ${u}</span></div></div>`).join('')}
    </div>`}
    ${r.description?`<p style="color:var(--muted);font-size:12px;margin-top:10px;line-height:1.6">${r.description}</p>`:''}
    ${r.notes?`<p style="color:var(--accent-dim);font-size:11px;margin-top:8px;font-style:italic">💡 ${r.notes}</p>`:''}
  </div>
  <div style="display:flex;gap:8px">
    <button class="btn btn-secondary" style="flex:1" onclick="state.addStep='input';render()">← Reanalisar</button>
    <button class="btn${isAct?' btn-activity':' btn-primary'}" style="flex:2" onclick="saveEntryResult()">Salvar ✓</button>
  </div>`;
}

function renderReportModal(){
  return `<div class="modal-center" onclick="closeModalOverlay(event)">
    <div class="modal-box">
      <div class="modal-header"><span class="modal-title">📊 Relatório</span><button class="modal-close" onclick="closeModal()">✕</button></div>
      ${state.reportLoading
        ?`<div style="text-align:center;padding:48px 0"><div class="spinner">📊</div><p style="color:var(--muted);margin-top:16px">Gerando análise...</p></div>`
        :`<p class="report-text">${state.reportText||'Sem dados.'}</p>`}
    </div>
  </div>`;
}

function renderKeyModal(){
  return `<div class="modal-center" onclick="closeModalOverlay(event)">
    <div class="modal-box">
      <div class="modal-header"><span class="modal-title">🔑 Alterar API Key</span><button class="modal-close" onclick="closeModal()">✕</button></div>
      <label class="input-label">Nova chave</label>
      <input id="new-key-input" class="input" type="password" placeholder="sk-ant-..." style="margin-bottom:12px">
      <button class="btn btn-primary" onclick="applyNewKey()">Salvar</button>
    </div>
  </div>`;
}

function render(){
  const app=document.getElementById('app');
  if(!state.apiKey){ app.innerHTML=renderSetup(); return; }
  const views={today:renderToday,history:renderHistory,settings:renderSettings};
  const tabs={today:'🥗 Hoje',history:'📅 Histórico',settings:'⚙️ Config'};
  let modal='';
  if(state.modal==='add') modal=renderAddModal();
  else if(state.modal==='report') modal=renderReportModal();
  else if(state.modal==='key') modal=renderKeyModal();
  app.innerHTML=`
    <div class="header">
      <div class="header-row">
        <div><div class="header-title">NutriTracker</div><div class="header-name">Diário Alimentar</div></div>
        <button class="btn-outline" onclick="openReport()">📊 Relatório</button>
      </div>
      <div class="tabs">${Object.entries(tabs).map(([k,v])=>`<button class="tab${state.view===k?' active':''}" onclick="setView('${k}')">${v}</button>`).join('')}</div>
    </div>
    <div style="padding-top:8px">${(views[state.view]||renderToday)()}</div>
    ${modal}
    ${state.view!=='settings'?`<button class="fab" onclick="openAdd()">+</button>`:''}`;
}

function setView(v){ state.view=v; render(); }
function setDate(d){ state.filterDate=d; render(); }
function setAddType(t){ state.addType=t; state.addStep='input'; state.addResult=null; state.addError=null; render(); }
function toggleEntry(id){ state.expandedEntries.has(id)?state.expandedEntries.delete(id):state.expandedEntries.add(id); render(); }
function deleteEntry(id){ if(!confirm('Excluir este registro?')) return; state.entries=state.entries.filter(e=>e.id!==id); saveEntries(); render(); }

function openAdd(){
  Object.assign(state,{addType:'food',addStep:'input',addText:'',addImageB64:null,addImageURL:null,addResult:null,addError:null,addDate:state.filterDate,actName:'',actDuration:'',actKcal:'',actHrAvg:'',actHrMax:'',actNotes:''});
  state.modal='add'; render();
}
function openReport(){ state.modal='report'; generateReport(); render(); }
function closeModal(){ state.modal=null; render(); }
function closeModalOverlay(e){ if(e.target===e.currentTarget) closeModal(); }

function syncBtn(){ const b=document.getElementById('analyze-btn'); if(b) b.disabled=!state.addText&&!state.addImageB64; }

function startAnalyze(){
  const t=document.getElementById('add-text'); if(t) state.addText=t.value;
  if(state.addType==='activity') analyzeActivity();
  else{ if(!state.addText&&!state.addImageB64) return; analyzeFood(); }
}

function handlePhoto(e){
  const file=e.target.files[0]; if(!file) return;
  state.addImageURL=URL.createObjectURL(file);
  const reader=new FileReader();
  reader.onload=ev=>{ state.addImageB64=ev.target.result.split(',')[1]; render(); };
  reader.readAsDataURL(file);
}

function saveEntryResult(){ state.entries.push(state.addResult); saveEntries(); state.modal=null; render(); }

function saveApiKey(){ const k=document.getElementById('setup-key')?.value?.trim(); if(!k) return; state.apiKey=k; saveKey(k); render(); }
function promptChangeKey(){ state.modal='key'; render(); }
function applyNewKey(){ const k=document.getElementById('new-key-input')?.value?.trim(); if(!k) return; state.apiKey=k; saveKey(k); state.modal=null; render(); }
function confirmClear(){ if(!confirm('Apagar TODOS os dados? Irreversível.')) return; state.entries=[]; saveEntries(); render(); }

loadState();
render();
</script>
</body>
</html>
